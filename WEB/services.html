<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Practice</title>
</head>
<body>

<h2>JavaScript Input Form</h2>

<!-- Name -->
First Name: <input type="text" id="firstName"><br><br>
Last Name: <input type="text" id="lastName"><br><br>

<!-- Age -->
Age: <input type="number" id="age"><br><br>

<!-- Numbers -->
Number 1: <input type="number" id="num1"><br><br>
Number 2: <input type="number" id="num2"><br><br>

<!-- Price -->
Item Price: <input type="number" id="price"><br><br>
Quantity: <input type="number" id="qty"><br><br>

<!-- City -->
City: <input type="text" id="city"><br><br>

<!-- Marks -->
Marks: <input type="number" id="marks"><br><br>

<!-- Radius -->
Radius: <input type="number" id="radius"><br><br>

<!-- Swap -->
Value A: <input type="number" id="a"><br><br>
Value B: <input type="number" id="b"><br><br>

<!-- Email -->
Email: <input type="text" id="email"><br><br>

<!-- Seconds -->
Seconds: <input type="number" id="seconds"><br><br>

<button onclick="calculate()">Calculate</button>

<h2>Results</h2>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
